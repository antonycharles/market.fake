server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /project/;
    }

    location = /project {
        return 302 /project/;
    }

    location ^~ /project/ {
        try_files $uri $uri/ /project/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # arquivos .well-known devem ser servidos diretamente
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # compressão opcional
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
